spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/shelflife}

google:
  books:
    api:
      key: ${GOOGLE_BOOKS_API_KEY:}

firebase:
  auth:
    enabled: ${FIREBASE_AUTH_ENABLED:true}
    project-id: ${FIREBASE_PROJECT_ID:shelflife-968cf}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  users:
    email-index-initializer:
      enabled: ${USER_EMAIL_INDEX_INITIALIZER_ENABLED:true}
